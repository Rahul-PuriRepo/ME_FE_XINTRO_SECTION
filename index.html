<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intro Section</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <img
        class="logo"
        src="./assets/images/logo.svg"
        alt="snap's logo"
    >

    <img
        class="open-menu"
        src="./assets/images/icon-menu.svg"
        alt="Open Menu"
    >

    <div class="overlay"></div>

    <nav>

        <img
            class="close-menu"
            src="./assets/images/icon-close-menu.svg"
            alt="Close Menu"
        >

        <ul class="navigation">

            <li>

                <button class="nav-link">
                    Features
                    <img
                        src="./assets/images/icon-arrow-down.svg"
                        alt=""
                    >
                </button>

                <ul class="dropdown-list">

                    <li class="dropdown-link">
                        <a
                            aria-label="todo-list"
                            href="#"
                        >
                            <img src="./assets/images/icon-todo.svg" alt="">
                            Todo List
                        </a>
                    </li>

                    <li class="dropdown-link">
                        <a href="#">
                            <img src="./assets/images/icon-calendar.svg" alt="">
                            Calendar
                        </a>
                    </li>

                    <li class="dropdown-link">
                        <a href="#">
                            <img src="./assets/images/icon-reminders.svg" alt="">
                            Reminders
                        </a>
                    </li>

                    <li class="dropdown-link">
                        <a href="#">
                            <img src="./assets/images/icon-planning.svg" alt="">
                            Planning
                        </a>
                    </li>

                </ul>

            </li>

            <li>

                <button class="nav-link">
                    Company
                    <img
                        src="./assets/images/icon-arrow-down.svg"
                        alt=""
                    >
                </button>

                <ul class="dropdown-list">

                    <li class="dropdown-link"><a href="#">History</a></li>
                    <li class="dropdown-link"><a href="#">Our Team</a></li>
                    <li class="dropdown-link"><a href="#">Blog</a></li>

                </ul>

            </li>

            <li><a href="#">Careers</a></li>
            <li><a href="#">About</a></li>

        </ul>

        <div class="registration">

            <button>Login</button>

            <button>Register</button>

        </div>

    </nav>

</header>

<main>

    <picture>

        <source
            media="(min-width:768px)"
            srcset="./assets/images/image-hero-desktop.png"
        >

        <img
            src="./assets/images/image-hero-mobile.png"
            alt="Hero"
        >

    </picture>

    <div class="text-content">

        <h1>Make remote work</h1>

        <p>
            Get your team in sync, no matter your location.
            Streamline processes, create team rituals, and watch
            productivity soar.
        </p>

        <button>Learn More</button>

        <div class="clients">

            <img src="./assets/images/client-databiz.svg" alt="">
            <img src="./assets/images/client-audiophile.svg" alt="">
            <img src="./assets/images/client-meet.svg" alt="">
            <img src="./assets/images/client-maker.svg" alt="">

        </div>

    </div>

</main>

<footer class="attribution">

    Challenge by

    <a
        href="https://crio.do"
        target="_blank"
    >
        Crio.do
    </a>

</footer>

<script src="script.js"></script>

</body>
</html>
